name: Release Python package

on:
  push:
    branches:
      - dev
      - staging
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel to publish"
        required: false
        type: choice
        options:
          - stable
          - staging
          - dev
      version:
        description: "Optional exact PEP 440 version override"
        required: false
        type: string

env:
  BUILDKITE_ORG_SLUG: cyberwave
  BUILDKITE_PYTHON_REGISTRY_SLUG: cyberwave-cloud-node

jobs:
  python-package-release:
    name: build and publish Python package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine

      - name: Resolve channel and version
        id: release
        working-directory: cyberwave-cloud-nodes/cyberwave-cloud-node
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          CHANNEL="${INPUT_CHANNEL:-}"
          if [ -z "$CHANNEL" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              CHANNEL="stable"
            elif [ "${GITHUB_REF_NAME}" = "dev" ] || [ "${GITHUB_REF_NAME}" = "staging" ]; then
              CHANNEL="${GITHUB_REF_NAME}"
            else
              CHANNEL="stable"
            fi
          fi

          case "$CHANNEL" in
            stable|dev|staging) ;;
            *)
              echo "Unsupported channel: $CHANNEL" >&2
              exit 1
              ;;
          esac

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ "$CHANNEL" = "stable" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              VERSION="${GITHUB_REF_NAME#v}"
            else
              VERSION="$(python ../../.github/scripts/package_versioning.py compute \
                --pyproject pyproject.toml \
                --branch production \
                --run-number 0 \
                --package-type python)"
            fi
          else
            VERSION="$(python ../../.github/scripts/package_versioning.py compute \
              --pyproject pyproject.toml \
              --branch "$CHANNEL" \
              --run-number "${GITHUB_RUN_NUMBER}" \
              --package-type python)"
          fi

          python ../../.github/scripts/package_versioning.py replace \
            --file pyproject.toml \
            --pattern-key pyproject \
            --version "${VERSION}"

          {
            echo "channel=${CHANNEL}"
            echo "version=${VERSION}"
          } >> "${GITHUB_OUTPUT}"

          echo "Resolved ${CHANNEL} release version: ${VERSION}"

      - name: Build package
        working-directory: cyberwave-cloud-nodes/cyberwave-cloud-node
        run: python -m build

      - name: Check package distributions
        working-directory: cyberwave-cloud-nodes/cyberwave-cloud-node
        run: python -m twine check dist/*

      - name: Publish stable package distributions to PyPI
        if: steps.release.outputs.channel == 'stable'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cyberwave-cloud-nodes/cyberwave-cloud-node/dist/
          skip-existing: true

      - name: Publish prerelease distributions to Buildkite
        if: steps.release.outputs.channel == 'dev' || steps.release.outputs.channel == 'staging'
        working-directory: cyberwave-cloud-nodes/cyberwave-cloud-node
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BUILDKITE_API_TOKEN}" ]; then
            echo "❌ ERROR: BUILDKITE_API_TOKEN is not set!"
            exit 1
          fi

          shopt -s nullglob
          PACKAGE_FILES=(dist/*)
          if [ ${#PACKAGE_FILES[@]} -eq 0 ]; then
            echo "❌ ERROR: No Python distributions were built."
            exit 1
          fi

          API_URL="https://api.buildkite.com/v2/packages/organizations/${BUILDKITE_ORG_SLUG}/registries/${BUILDKITE_PYTHON_REGISTRY_SLUG}/packages"

          for PACKAGE_FILE in "${PACKAGE_FILES[@]}"; do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${API_URL}" \
              -H "Authorization: Bearer ${BUILDKITE_API_TOKEN}" \
              -F "file=@${PACKAGE_FILE}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "❌ Failed to upload ${PACKAGE_FILE} (HTTP ${HTTP_CODE})"
              echo "Response: ${BODY}"
              exit 1
            fi
          done
